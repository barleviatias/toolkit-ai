name: Validate Catalog

on:
  pull_request:
    paths:
      - "catalog.generated.json"
      - "resources/plugins/**"
      - "resources/mcps/**"
      - "resources/teams.json"

jobs:
  validate-catalog:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate catalog schema and plugin references
        run: node scripts/ci/validate-catalog.js
