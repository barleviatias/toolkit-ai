name: Publish to npm

on:
  push:
    branches: [main]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Install dev dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Check if version already published
        id: check
        run: |
          PACKAGE_NAME=$(node -e "import('./package.json',{assert:{type:'json'}}).then(m=>console.log(m.default.name))")
          PACKAGE_VERSION=$(node -e "import('./package.json',{assert:{type:'json'}}).then(m=>console.log(m.default.version))")
          if npm view "${PACKAGE_NAME}@${PACKAGE_VERSION}" version 2>/dev/null; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Version ${PACKAGE_VERSION} already published — skipping"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish package
        if: steps.check.outputs.exists == 'false'
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
